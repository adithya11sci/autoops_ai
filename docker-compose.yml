version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: autoops-postgres
    environment:
      POSTGRES_DB: autoops
      POSTGRES_USER: autoops
      POSTGRES_PASSWORD: autoops_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoops"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Zookeeper ───────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: autoops-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Kafka ────────────────────────────────
  kafka:
    image: bitnami/kafka:latest
    container_name: autoops-kafka
    depends_on:
      - zookeeper
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Redis (Cache) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: autoops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── ChromaDB ────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: autoops-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false

volumes:
  postgres_data:
  kafka_data:
  chroma_data:
  redis_data:
